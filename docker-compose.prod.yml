version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mobile_ganj_mysql_prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: mobile_ganj
      MYSQL_USER: ${DB_USERNAME:-mobile_ganj_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-mobile_ganj_pass}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 20s
      retries: 10
    networks:
      - mobile_ganj_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mobile_ganj_app_prod
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mobile_ganj_network

networks:
  mobile_ganj_network:
    driver: bridge

volumes:
  mysql_data:

