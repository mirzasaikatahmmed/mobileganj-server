version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mobile_ganj_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mobile_ganj
      MYSQL_USER: mobile_ganj_user
      MYSQL_PASSWORD: mobile_ganj_pass
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 20s
      retries: 10
    networks:
      - mobile_ganj_network

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: mobile_ganj_app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: mobile_ganj_user
      DB_PASSWORD: mobile_ganj_pass
      DB_DATABASE: mobile_ganj
      DB_SYNCHRONIZE: false
      DB_LOGGING: true
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: your-super-secret-refresh-token-key-change-in-production
      JWT_REFRESH_EXPIRES_IN: 30d
      SUPERADMIN_EMAIL: superadmin@mobileganj.com
      SUPERADMIN_PASSWORD: superadmin123
      SUPERADMIN_NAME: Super Admin
      SUPERADMIN_PHONE: 01700000001
      UPLOAD_PATH: ./uploads
      MAX_FILE_SIZE: 5242880
    volumes:
      - .:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mobile_ganj_network

networks:
  mobile_ganj_network:
    driver: bridge

volumes:
  mysql_data:
