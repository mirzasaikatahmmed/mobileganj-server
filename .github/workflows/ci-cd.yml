name: CI/CD

on:
  push:
    branches:
      - master

jobs:
  test-and-build:
    if: github.repository == github.event.repository.full_name
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CI/CD checks
        run: pnpm ci:fix && pnpm ci:cd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.PACKAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.repository == github.event.repository.full_name

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install Cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          cloudflared --version

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/server.ssh
          chmod 600 ~/.ssh/server.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Setup SSH Config
        run: |
          cat >> ~/.ssh/config << 'EOF'
          Host server
              HostName ${{ secrets.VPS_HOST }}
              User ${{ secrets.VPS_USER }}
              ProxyCommand cloudflared access ssh --hostname ${{ secrets.VPS_HOST }}
              IdentityFile ~/.ssh/server.ssh
              StrictHostKeyChecking no
              LogLevel QUIET
              RequestTTY no
              UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Test SSH Connection
        run: ssh -q server 'echo "SSH connection successful"'

      - name: Docker Login on Server
        run: ssh -q server "echo '${{ secrets.DOCKERHUB_TOKEN }}' | docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' --password-stdin"

      - name: Copy Docker Compose File
        run: scp -q -F ~/.ssh/config docker-compose.prod.yml server:${{ secrets.VPS_DIRECTORY }}/

      - name: Deploy Application
        run: |
          ssh -q server 2>&1 << 'EOF' | grep -v "Welcome\|Documentation\|Management\|Support\|System information\|System load\|Usage of\|Memory usage\|Swap usage\|Temperature\|Processes\|Users logged in\|IPv4 address\|IPv6 address\|Strictly confined\|Expanded Security\|updates can be\|Web console"
          cd apps/${{ secrets.VPS_DIRECTORY }}

          if [ ! -f .env ]; then
            echo "Warning: .env file not found"
          fi

          docker compose -f docker-compose.prod.yml down
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d
          docker system prune -f

          echo "Deployment completed successfully!"
          EOF
